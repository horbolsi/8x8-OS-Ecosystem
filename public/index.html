<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8x8 OS Ecosystem · FlashTM8</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at 10% 20%, #0a0f1e, #03060c);
            color: white;
            font-family: system-ui, -apple-system, 'Segoe UI', monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .glass {
            backdrop-filter: blur(12px);
            background: rgba(0, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 3rem;
            padding: 3rem 5rem;
            text-align: center;
            box-shadow: 0 0 60px rgba(0, 255, 255, 0.2);
            transition: all 0.3s ease;
        }
        .glass:hover {
            border-color: cyan;
            box-shadow: 0 0 90px rgba(0, 255, 255, 0.4);
        }
        h1 {
            font-size: 4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
        }
        .tagline {
            font-size: 1.3rem;
            margin: 1rem 0;
            opacity: 0.8;
        }
        .emoji {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        .version {
            margin-top: 2rem;
            font-size: 0.9rem;
            border-top: 1px dashed rgba(0,255,255,0.3);
            padding-top: 1rem;
            display: inline-block;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-10px); }
        }
        .emoji { animation: float 3s ease-in-out infinite alternate; }
    </style>
</head>
<body>
    <div class="glass">
        <div class="emoji">🌎⚡️🚀🌚</div>
        <h1>8x8 OS Ecosystem</h1>
        <div class="tagline">by FlashTM8</div>
        <div class="version">v0.0.1 · Hello World!</div>
        <div style="margin-top: 2rem; font-size: 0.8rem;">⚛️ quantum‑aware · sovereign‑ready</div>
    </div>
</body>
</html>
