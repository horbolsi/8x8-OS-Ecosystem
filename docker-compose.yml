version: "3.9"

services:
  hub-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
        HUB_PORT: 3000
    image: 8x8-hub-server:latest
    container_name: 8x8-hub-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - HUB_PORT=3000
      - DATABASE_URL=postgresql://hub_user:hub_pass@hub-db:5432/hub_db
      - ADMIN_SECRET=${ADMIN_SECRET:-change-me-in-production}
      - TG_BOT_TOKEN=${TG_BOT_TOKEN:-}
      - ALLOWED_ORIGINS=http://localhost:8086,http://localhost:3000
    depends_on:
      hub-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - hub-network

  # PostgreSQL for development (uncomment for local dev with persistent DB)
  # For Render/production, use Render's managed PostgreSQL instead.
  hub-db:
    image: postgres:16-alpine
    container_name: 8x8-hub-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: hub_db
      POSTGRES_USER: hub_user
      POSTGRES_PASSWORD: hub_pass
    volumes:
      - hub-db-data:/var/lib/postgresql/data
      - ./db-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hub_user -d hub_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - hub-network

volumes:
  hub-db-data:
    driver: local

networks:
  hub-network:
    driver: bridge
