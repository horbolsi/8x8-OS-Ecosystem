# Render Blueprint for 8x8 Ecosystem OS
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: 8x8-ecosystem-api
    runtime: python
    plan: free
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: 8x8-ecosystem-db
          property: connectionString
      - key: TELEGRAM_BOT_TOKEN
        sync: false  # Set manually in Render dashboard
      - key: ADMIN_KEY
        sync: false  # Set manually in Render dashboard — NEVER hardcode
      - key: BACKEND_URL
        value: "https://8x8-ecosystem-api.onrender.com"
      - key: PAY_WALLET_USDT
        sync: false  # Set manually — your USDT wallet
      - key: PAY_WALLET_BTC
        sync: false  # Set manually — your BTC wallet
      - key: PAY_WALLET_ETH
        sync: false
      - key: PAY_WALLET_XMR
        sync: false
      - key: PAY_WALLET_SOL
        sync: false
      - key: PAY_WALLET_BNB
        sync: false
      - key: PAY_WALLET_TON
        sync: false
      - key: PAY_WALLET_PI
        sync: false

  - type: worker
    name: 8x8-ecosystem-bot
    runtime: python
    plan: free
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd bot && python telegram_bot.py"
    autoDeploy: true
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: BACKEND_URL
        fromService:
          name: 8x8-ecosystem-api
          type: web
          property: url
      - key: ADMIN_KEY
        sync: false  # Set manually in Render dashboard

databases:
  - name: 8x8-ecosystem-db
    plan: free
    databaseName: 8x8_ecosystem
    user: 8x8_admin
