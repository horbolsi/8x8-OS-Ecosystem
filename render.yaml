services:
  - type: web
    name: 8x8-hub-server
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm install
    startCommand: node server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HUB_PORT
        value: "3000"
      - key: ADMIN_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: "*"
    autoDeploy: true
