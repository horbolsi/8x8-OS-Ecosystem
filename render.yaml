# 8x8 Hub Server - Render Native Node.js
# render.yaml for native Node runtime (no Docker)

services:
  - type: web
    name: 8x8-hub-server
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm install
    startCommand: node server/index.ts
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HUB_PORT
        value: "3000"
      - key: ADMIN_SECRET
        generateValue: true
      - key: TG_BOT_TOKEN
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: FAL_KEY
        sync: false
      - key: BITGET_API_KEY
        sync: false
      - key: BITGET_SECRET_KEY
        sync: false
      - key: BITGET_PASSPHRASE
        sync: false
      - key: NEON_DATABASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        value: "*"
    autoDeploy: true
