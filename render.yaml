# Render Blueprint for 8x8 Ecosystem OS
services:
  - type: web
    name: 8x8-ecosystem-api
    runtime: python
    plan: free
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ADMIN_KEY
        sync: false
      - key: BACKEND_URL
        value: "https://8x8-ecosystem-api.onrender.com"
      - key: PAY_WALLET_BTC
        sync: false
      - key: PAY_WALLET_XMR
        sync: false

  - type: worker
    name: 8x8-ecosystem-bot
    runtime: python
    plan: free
    buildCommand: "pip install -r bot/requirements.txt"
    startCommand: "cd bot && python telegram_bot.py"
    autoDeploy: true
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: BACKEND_URL
        fromService:
          name: 8x8-ecosystem-api
          type: web
          property: url

databases:
  - name: 8x8-ecosystem-db
    plan: free
    databaseName: 8x8_ecosystem
    user: 8x8_admin
