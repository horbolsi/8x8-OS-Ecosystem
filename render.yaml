# ============================================
# Render Blueprint for 8x8 Hub Server
# ============================================
# Deploy via: https://render.com/docs/blueprint-spec
# Connect your GitHub repo and Render will read this file.

services:
  - type: web
    name: 8x8-hub-server
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HUB_PORT
        value: "3000"
      - key: DATABASE_URL
        fromDatabase:
          name: hub-db
          property: connectionString
      - key: ADMIN_SECRET
        sync: false  # Set manually in Render dashboard
      - key: TG_BOT_TOKEN
        sync: false  # Set manually in Render dashboard
      - key: ALLOWED_ORIGINS
        value: "https://8x8-hub.onrender.com"
    autoDeploy: true

databases:
  - name: hub-db
    plan: starter
    region: oregon
    databaseName: hub_db
    user: hub_user
