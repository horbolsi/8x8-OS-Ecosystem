services:
  - type: web
    name: 8x8-hub-v2
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HUB_PORT
        value: "3000"
      - key: ADMIN_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: "*"
    autoDeploy: true
